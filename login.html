<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TARA AI Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial;
}

body{

margin:0;
height:100vh;

background:
linear-gradient(rgba(5,10,25,.85),rgba(5,10,25,.92)),
url("/assets/tools-bg.jpg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;

}

/* glass card */

.card{

width:420px;
padding:45px;

border-radius:14px;

background:rgba(17,24,39,.8);
backdrop-filter:blur(12px);

box-shadow:
0 25px 60px rgba(0,0,0,.6),
0 0 40px rgba(79,70,229,.25);

}

/* logo */

.logo{

display:flex;
justify-content:center;
margin-bottom:15px;

}

.logo img{

width:70px;

}

/* title */

.title{

text-align:center;
font-size:24px;
font-weight:600;
margin-bottom:30px;

}

/* inputs */

input{

width:100%;
padding:15px;

margin-bottom:18px;

border:none;
border-radius:8px;

background:#1f2937;
color:white;

font-size:14px;

transition:.2s;

}

input:focus{

outline:none;
background:#374151;

}

/* button */

button{

width:100%;
padding:15px;

border:none;
border-radius:8px;

background:linear-gradient(90deg,#4f46e5,#6366f1);

color:white;
font-weight:600;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-1px);
box-shadow:0 6px 18px rgba(99,102,241,.5);

}

/* links */

.links{

display:flex;
justify-content:space-between;
margin-top:16px;
font-size:13px;

}

.links a{

color:#a5b4fc;
text-decoration:none;

}

.links a:hover{

text-decoration:underline;

}

/* footer */

.footer{

margin-top:28px;
text-align:center;
font-size:12px;
opacity:.6;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<img src="/assets/tara-logo.jpg">

</div>

<div class="title">

TARA AI Tools

</div>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">

Login

</button>

<div class="links">

<a href="/register.html">Register</a>

<a href="#" id="forgot">Forgot password?</a>

</div>

<div id="msg"></div>

<div class="footer">

Trading & Research Academy

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://lwrqdsqvjfdgrikmjmzi.supabase.co",
"YOUR_ANON_KEY"
)

/* login */

document.getElementById("loginBtn").onclick=async()=>{

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signInWithPassword({

email,
password

})

if(error){

document.getElementById("msg").innerText=error.message
return

}

window.location="/index.html"

}

/* forgot password */

document.getElementById("forgot").onclick=async()=>{

const email=document.getElementById("email").value

if(!email){

alert("Enter email first")
return

}

await supabase.auth.resetPasswordForEmail(email)

alert("Password reset email sent")

}

</script>

</body>
</html>
