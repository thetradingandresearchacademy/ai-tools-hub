<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TARA AI Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial;
}

body{

margin:0;
height:100vh;

background:
linear-gradient(rgba(5,10,25,.85),rgba(5,10,25,.92)),
url("/assets/tools-bg.jpg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;

}

/* card */

.card{

width:460px;
padding:45px;

border-radius:14px;

background:rgba(17,24,39,.85);
backdrop-filter:blur(14px);

box-shadow:
0 25px 60px rgba(0,0,0,.6),
0 0 40px rgba(79,70,229,.25);

}

/* logo */

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:80px;
}

/* title */

.title{
text-align:center;
font-size:30px;
font-weight:600;
margin-bottom:30px;
}

/* inputs */

input{

width:100%;
padding:18px;

margin-bottom:18px;

border:none;
border-radius:8px;

background:#1f2937;
color:white;

font-size:16px;

transition:.2s;

}

input:focus{
outline:none;
background:#374151;
}

/* button */

button{

width:100%;
padding:18px;

border:none;
border-radius:8px;

background:linear-gradient(90deg,#4f46e5,#6366f1);

color:white;
font-weight:600;
font-size:16px;

cursor:pointer;
transition:.2s;

}

button:hover{

transform:translateY(-1px);
box-shadow:0 6px 18px rgba(99,102,241,.5);

}

/* links */

.links{

display:flex;
justify-content:space-between;
margin-top:16px;
font-size:14px;

}

.links a{

color:#a5b4fc;
text-decoration:none;

}

.links a:hover{
text-decoration:underline;
}

.msg{
margin-top:14px;
color:#f87171;
text-align:center;
}

/* footer */

.footer{
margin-top:28px;
text-align:center;
font-size:13px;
opacity:.6;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
<img src="/assets/tara-logo.jpg">
</div>

<div class="title">
TARA AI Tools
</div>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<div class="links">

<a href="/register.html">Register</a>
<a href="#" id="forgot">Forgot password?</a>

</div>

<div class="msg" id="msg"></div>

<div class="footer">
Trading & Research Academy
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://lwrqdsqvjfdgrikmjmzi.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cmdkc3F2amZkZ3Jpa21qbXppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNTgxNzMsImV4cCI6MjA4NjYzNDE3M30.hYvtNelvAlsq0oDdL_x64mDq1RYaje_0njQCaG0bc7U"
)

/* auto redirect if logged in */

const { data:session } = await supabase.auth.getSession()

if(session.session){
window.location="/index.html"
}

/* login */

document.getElementById("loginBtn").onclick=async()=>{

const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()

document.getElementById("msg").innerText=""

const { data,error }=await supabase.auth.signInWithPassword({

email,
password

})

if(error){

document.getElementById("msg").innerText=error.message
return

}

window.location="/index.html"

}

/* forgot password */

document.getElementById("forgot").onclick=async()=>{

const email=document.getElementById("email").value.trim()

if(!email){

alert("Enter your email first")
return

}

const { error } = await supabase.auth.resetPasswordForEmail(email,{
redirectTo: window.location.origin + "/login.html"
})

if(error){
alert(error.message)
return
}

alert("Password reset email sent")

}

</script>

</body>
</html>
