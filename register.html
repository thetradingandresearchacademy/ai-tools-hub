<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
font-family:Inter;
color:white;
}

.card{
width:420px;
padding:45px;
background:#111827;
border-radius:12px;
box-shadow:0 25px 60px rgba(0,0,0,.6);
}

h2{
text-align:center;
font-size:28px;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;
border:none;
border-radius:8px;
font-size:16px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:16px;
font-size:16px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.msg{
margin-top:15px;
text-align:center;
}

.loginlink{
margin-top:18px;
text-align:center;
font-size:14px;
}

.loginlink a{
color:#818cf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="registerBtn">Register</button>

<div class="msg" id="msg"></div>

<div class="loginlink">

Already have an account?
<a href="/login.html">Login</a>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://lwrqdsqvjfdgrikmjmzi.supabase.co",
"YOUR_ANON_KEY"
)

document.getElementById("registerBtn").onclick=async()=>{

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({

email,
password

})

if(error){

document.getElementById("msg").innerText=error.message
return

}

document.getElementById("msg").innerText="Account created. Check your email to confirm."

setTimeout(()=>{

window.location="/login.html"

},3000)

}

</script>

</body>
</html>
